h2_atr_ccs:
  # Technology specs: mode, commodities, description
  description: natural gas type technology
  mode: M1
  commodity:
  # Commodities: inputs and outputs 
    - input: 
      - com_name: 
        - electr
        - gas
      - com_value: 
        - 0.05 #0.05
        - 1.2
      - com_level: 
        - secondary
        - secondary
    - output: 
      - com_name: 
        - hydrogen
      - com_value: 
        - 1
      - com_level: 
        - secondary 
  # Time specifications: lifetime, construction time
  time: year
  tec_lifetime: 40  #40
  construction_time: 3 # Random number of years for now -- CCF
  # Units for cost and energy
  unit: 
    - cost: 'USD/kWa'
    - energy: '-'
  # Geographical specs: nodes selection, provinces
  # Specify "all" below for all provinces in Canada to be selected, or "custom" for a sub-set of provinces
  node_select: all
  provinces: 
    - Alberta
    #- Saskatchewan
  # Cost specifications: investment, fiixed, and variable
  inv_cost_2020: 
    - cost_level: primary
    - cost_value: 1054 #1054
  fix_cost_2020: 
    - cost_level: primary
    - cost_value: 30 
  var_cost_2020:
    - cost_level: primary
    - cost_value: 0
  # Emissions specifications
  #TC = TCO2 * 0.2727
  emission_factor: 0.0444
  emission_type: CO2_cc
  capacity_factor: 0.9
  investment_lr: 0.9169
  fixed_cost_lr: 0.9169

